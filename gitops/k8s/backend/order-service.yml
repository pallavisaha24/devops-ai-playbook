apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: 806148750549.dkr.ecr.ap-south-1.amazonaws.com/order-service:c2f2a93e34025dbd612c420b81f0575048a8629d
          ports:
            - containerPort: 3004
          env:
            - name: NODE_ENV
              value: development
            - name: PORT
              value: "3004"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: ORDERS_DB_URL
            - name: AUTH_SERVICE_URL
              value: "http://auth:3002"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:3003"
