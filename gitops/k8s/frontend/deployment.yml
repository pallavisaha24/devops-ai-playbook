apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 806148750549.dkr.ecr.ap-south-1.amazonaws.com/frontend:c2f2a93e34025dbd612c420b81f0575048a8629d
          ports:
            - containerPort: 3000
          env:
            - name: REACT_APP_API_URL
              value: "http://gateway:3001/api"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: boutique
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP

